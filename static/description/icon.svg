<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="30" fill="#0d6efd"/>
  <!-- Boîte lot -->
  <rect x="40" y="85" width="120" height="75" rx="8" fill="white" opacity="0.15"/>
  <rect x="40" y="85" width="120" height="75" rx="8" fill="none" stroke="white" stroke-width="4"/>
  <!-- Étiquette LOT -->
  <text x="100" y="135" text-anchor="middle" fill="white" font-size="28" font-family="Arial" font-weight="bold">LOT</text>
  <!-- Calendrier -->
  <rect x="60" y="30" width="80" height="60" rx="6" fill="white" opacity="0.9"/>
  <rect x="60" y="30" width="80" height="20" rx="6" fill="#0d6efd"/>
  <rect x="60" y="44" width="80" height="6" fill="#0d6efd"/>
  <text x="100" y="75" text-anchor="middle" fill="#0d6efd" font-size="20" font-family="Arial" font-weight="bold">11</text>
  <!-- Barre date -->
  <line x1="70" y1="37" x2="70" y2="25" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="37" x2="130" y2="25" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
